<svg width="1100" height="660" viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="660" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Art Museum — System Architecture (AWS EC2)</text>

  <!-- ═══════════════ BROWSER ═══════════════ -->
  <rect x="15" y="195" width="158" height="225" rx="9" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="15" y="195" width="158" height="36" rx="9" fill="#1e293b"/>
  <rect x="15" y="219" width="158" height="12" fill="#1e293b"/>
  <circle cx="32" cy="213" r="5" fill="#f87171"/>
  <circle cx="47" cy="213" r="5" fill="#fbbf24"/>
  <circle cx="62" cy="213" r="5" fill="#34d399"/>
  <text x="94" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="white">Browser</text>
  <text x="94" y="251" text-anchor="middle" font-size="10" font-weight="600" fill="#334155">사용자 브라우저</text>
  <line x1="25" y1="258" x2="163" y2="258" stroke="#e2e8f0" stroke-width="1"/>
  <text x="94" y="275" text-anchor="middle" font-size="9" fill="#64748b">HTML / CSS / JS</text>
  <text x="94" y="291" text-anchor="middle" font-size="9" fill="#64748b">Thymeleaf 렌더링</text>
  <text x="94" y="307" text-anchor="middle" font-size="9" fill="#64748b">Form Submit</text>
  <text x="94" y="323" text-anchor="middle" font-size="9" fill="#64748b">Session Cookie</text>
  <text x="94" y="339" text-anchor="middle" font-size="9" fill="#64748b">CSRF Token</text>
  <text x="94" y="358" text-anchor="middle" font-size="9" fill="#94a3b8">Port 8080</text>
  <text x="94" y="406" text-anchor="middle" font-size="8.5" fill="#94a3b8">HTTP / HTTPS</text>

  <!-- Arrows Browser <-> EC2 -->
  <line x1="173" y1="293" x2="197" y2="293" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="197" y1="310" x2="173" y2="310" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-rev)"/>
  <text x="185" y="287" text-anchor="middle" font-size="7.5" fill="#94a3b8">req</text>
  <text x="185" y="323" text-anchor="middle" font-size="7.5" fill="#94a3b8">res</text>

  <!-- ═══════════════ AWS EC2 BOX ═══════════════ -->
  <rect x="200" y="50" width="625" height="568" rx="12" fill="white" stroke="#f97316" stroke-width="2.5" stroke-dasharray="9,4"/>
  <rect x="200" y="50" width="625" height="44" rx="12" fill="#ea580c"/>
  <rect x="200" y="78" width="625" height="16" fill="#ea580c"/>
  <text x="512" y="76" text-anchor="middle" font-size="12.5" font-weight="700" fill="white">AWS EC2   ·   Spring Boot 3.4.1   ·   Java 21   ·   Port 8080</text>

  <!-- Security Layer: y=102, h=62 -->
  <rect x="218" y="102" width="589" height="62" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="512" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Spring Security 6</text>
  <text x="512" y="137" text-anchor="middle" font-size="9" fill="#166534">Form Login (BCrypt 12)  ·  OAuth2 Client (Kakao · Naver)  ·  CSRF (CookieCsrfTokenRepository, HttpOnly=false)  ·  HTTP Session</text>
  <text x="512" y="153" text-anchor="middle" font-size="8.5" fill="#166534">Public: / · /gallery/** · /member/**   /   ADMIN: /admin/** · /todo/**   /   LOGIN Required: 그 외 모든 경로</text>

  <!-- Presentation Layer: y=176, h=130 -->
  <rect x="218" y="176" width="589" height="130" rx="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="512" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">Presentation Layer  (MVC Controllers + Thymeleaf 14 Templates)</text>

  <!-- Controller boxes -->
  <rect x="226" y="201" width="106" height="94" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="279" y="216" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1e40af">MemberController</text>
  <line x1="231" y1="221" x2="327" y2="221" stroke="#dbeafe" stroke-width="1"/>
  <text x="279" y="233" text-anchor="middle" font-size="7.5" fill="#475569">GET /member/login</text>
  <text x="279" y="246" text-anchor="middle" font-size="7.5" fill="#475569">GET /member/join</text>
  <text x="279" y="259" text-anchor="middle" font-size="7.5" fill="#475569">POST /member/join</text>
  <text x="279" y="272" text-anchor="middle" font-size="7.5" fill="#475569">POST /member/loginAction</text>
  <text x="279" y="285" text-anchor="middle" font-size="7.5" fill="#475569">GET /member/logout</text>

  <rect x="338" y="201" width="107" height="94" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="392" y="216" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1e40af">GalleryController</text>
  <line x1="343" y1="221" x2="440" y2="221" stroke="#dbeafe" stroke-width="1"/>
  <text x="392" y="233" text-anchor="middle" font-size="7.5" fill="#475569">GET /gallery/list</text>
  <text x="392" y="246" text-anchor="middle" font-size="7.5" fill="#475569">GET /gallery/detail</text>
  <text x="392" y="259" text-anchor="middle" font-size="7.5" fill="#475569">POST /gallery/detail</text>
  <text x="392" y="273" text-anchor="middle" font-size="7.5" fill="#94a3b8">(예약 신청 제출)</text>

  <rect x="451" y="201" width="122" height="94" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="512" y="216" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1e40af">ReservationController</text>
  <line x1="456" y1="221" x2="568" y2="221" stroke="#dbeafe" stroke-width="1"/>
  <text x="512" y="233" text-anchor="middle" font-size="7.5" fill="#475569">GET /reservation/list</text>
  <text x="512" y="246" text-anchor="middle" font-size="7.5" fill="#475569">GET /reservation/detail/{id}</text>
  <text x="512" y="259" text-anchor="middle" font-size="7.5" fill="#475569">POST /reservation/cancel/{id}</text>

  <rect x="579" y="201" width="107" height="94" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="633" y="216" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1e40af">AdminController</text>
  <line x1="584" y1="221" x2="681" y2="221" stroke="#dbeafe" stroke-width="1"/>
  <text x="633" y="233" text-anchor="middle" font-size="7.5" fill="#475569">/admin/gallery/**</text>
  <text x="633" y="246" text-anchor="middle" font-size="7.5" fill="#475569">/admin/reservation/**</text>
  <text x="633" y="259" text-anchor="middle" font-size="7.5" fill="#475569">갤러리 등록·수정·삭제</text>
  <text x="633" y="272" text-anchor="middle" font-size="7.5" fill="#475569">예약 승인·거절</text>
  <text x="633" y="285" text-anchor="middle" font-size="7.5" fill="#94a3b8">ADMIN 권한</text>

  <rect x="692" y="201" width="107" height="94" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="746" y="216" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1e40af">TodoController</text>
  <line x1="697" y1="221" x2="794" y2="221" stroke="#dbeafe" stroke-width="1"/>
  <text x="746" y="233" text-anchor="middle" font-size="7.5" fill="#475569">GET /todo/list</text>
  <text x="746" y="246" text-anchor="middle" font-size="7.5" fill="#475569">GET /todo/form</text>
  <text x="746" y="259" text-anchor="middle" font-size="7.5" fill="#475569">POST /todo/create</text>
  <text x="746" y="272" text-anchor="middle" font-size="7.5" fill="#475569">GET·POST /todo/update/{id}</text>
  <text x="746" y="285" text-anchor="middle" font-size="7.5" fill="#475569">POST /todo/delete/{id}</text>

  <!-- Arrow: Presentation -> Service -->
  <line x1="512" y1="306" x2="512" y2="322" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

