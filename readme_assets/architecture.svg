  <rect x="218" y="322" width="589" height="108" rx="7" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="512" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Service Layer</text>

  <rect x="226" y="347" width="108" height="72" rx="5" fill="white" stroke="#fde68a" stroke-width="1"/>
  <text x="280" y="362" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400e">MemberService</text>
  <text x="280" y="376" text-anchor="middle" font-size="7.5" fill="#64748b">회원가입 · BCrypt 암호화</text>
  <text x="280" y="389" text-anchor="middle" font-size="7.5" fill="#64748b">중복 이메일 검증</text>
  <text x="280" y="402" text-anchor="middle" font-size="7.5" fill="#64748b">UserDetailsService</text>

  <rect x="340" y="347" width="108" height="72" rx="5" fill="white" stroke="#fde68a" stroke-width="1"/>
  <text x="394" y="362" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400e">GalleryService</text>
  <text x="394" y="376" text-anchor="middle" font-size="7.5" fill="#64748b">갤러리 CRUD</text>
  <text x="394" y="389" text-anchor="middle" font-size="7.5" fill="#64748b">수용인원 차감·복구</text>
  <text x="394" y="402" text-anchor="middle" font-size="7.5" fill="#64748b">검색 · 페이징</text>

  <rect x="454" y="347" width="120" height="72" rx="5" fill="white" stroke="#fde68a" stroke-width="1"/>
  <text x="514" y="362" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400e">ReservationService</text>
  <text x="514" y="376" text-anchor="middle" font-size="7.5" fill="#64748b">예약 생성·취소</text>
  <text x="514" y="389" text-anchor="middle" font-size="7.5" fill="#64748b">승인·거절 처리</text>
  <text x="514" y="402" text-anchor="middle" font-size="7.5" fill="#64748b">이메일 기반 조회·페이징</text>

  <rect x="580" y="347" width="100" height="72" rx="5" fill="white" stroke="#fde68a" stroke-width="1"/>
  <text x="630" y="362" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400e">TodoService</text>
  <text x="630" y="376" text-anchor="middle" font-size="7.5" fill="#64748b">할일 CRUD</text>
  <text x="630" y="389" text-anchor="middle" font-size="7.5" fill="#64748b">완료 여부 필터</text>
  <text x="630" y="402" text-anchor="middle" font-size="7.5" fill="#64748b">마감일 정렬·페이징</text>

  <rect x="686" y="347" width="113" height="72" rx="5" fill="white" stroke="#fde68a" stroke-width="1"/>
  <text x="743" y="362" text-anchor="middle" font-size="8.5" font-weight="700" fill="#92400e">OAuth2UserService</text>
  <text x="743" y="376" text-anchor="middle" font-size="7.5" fill="#64748b">SNS 사용자 생성·조회</text>
  <text x="743" y="389" text-anchor="middle" font-size="7.5" fill="#64748b">Member 테이블 동기화</text>
  <text x="743" y="402" text-anchor="middle" font-size="7.5" fill="#64748b">Session 저장 · Role 부여</text>

  <!-- Arrow: Service -> Repository -->
  <line x1="512" y1="430" x2="512" y2="446" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Repository Layer: y=446, h=90 -->
  <rect x="218" y="446" width="589" height="90" rx="7" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="512" y="465" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">Repository Layer  (Spring Data JPA)</text>
  <text x="295" y="487" text-anchor="middle" font-size="9.5" fill="#374151">MemberRepository</text>
  <text x="408" y="487" text-anchor="middle" font-size="9.5" fill="#374151">GalleryRepository</text>
  <text x="530" y="487" text-anchor="middle" font-size="9.5" fill="#374151">ReservationRepository</text>
  <text x="650" y="487" text-anchor="middle" font-size="9.5" fill="#374151">TodoRepository</text>
  <text x="762" y="487" text-anchor="middle" font-size="9.5" fill="#374151">SnsUserRepository</text>
  <text x="512" y="507" text-anchor="middle" font-size="8.5" fill="#7c3aed">Hibernate ORM  ·  PostgreSQL Dialect  ·  HikariCP Connection Pool (max 10)  ·  DDL validate</text>
  <text x="512" y="523" text-anchor="middle" font-size="8" fill="#a78bfa">@Transactional  ·  커스텀 JPQL  ·  Pageable  ·  Sort</text>

  <!-- ═══════════════ EXTERNAL SERVICES ═══════════════ -->

  <!-- Arrow: EC2 -> Kakao -->
  <line x1="825" y1="155" x2="868" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="848" y="150" text-anchor="middle" font-size="8" fill="#64748b">OAuth2</text>

  <!-- Arrow: EC2 -> Naver -->
  <line x1="825" y1="175" x2="868" y2="258" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="858" y="220" text-anchor="middle" font-size="8" fill="#64748b">OAuth2</text>

  <!-- Arrow: EC2 -> PostgreSQL -->
  <line x1="825" y1="488" x2="868" y2="488" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="846" y="481" text-anchor="middle" font-size="8" fill="#64748b">JDBC/SSL</text>

  <!-- Kakao box: x=870, y=130, w=195, h=72 -->
  <rect x="870" y="130" width="195" height="72" rx="8" fill="#FEE500" stroke="#ca9f00" stroke-width="1.5"/>
  <text x="967" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#1c0a00">Kakao OAuth2</text>
  <text x="967" y="172" text-anchor="middle" font-size="9" fill="#3d1e00">카카오 소셜 로그인</text>
  <text x="967" y="188" text-anchor="middle" font-size="8" fill="#7a4a20">profile_nickname · account_email</text>

  <!-- Naver box: x=870, y=222, w=195, h=72 -->
  <rect x="870" y="222" width="195" height="72" rx="8" fill="#03C75A" stroke="#029947" stroke-width="1.5"/>
  <text x="967" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="white">Naver OAuth2</text>
  <text x="967" y="264" text-anchor="middle" font-size="9" fill="#d4ffe9">네이버 소셜 로그인</text>
  <text x="967" y="280" text-anchor="middle" font-size="8" fill="#a3f0cc">name · email · profile_image</text>

  <!-- PostgreSQL box: x=870, y=455, w=195, h=88 -->
  <rect x="870" y="455" width="195" height="88" rx="8" fill="white" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="870" y="455" width="195" height="34" rx="8" fill="#1d4ed8"/>
  <rect x="870" y="473" width="195" height="16" fill="#1d4ed8"/>
  <text x="967" y="472" text-anchor="middle" font-size="12" font-weight="700" fill="white">PostgreSQL</text>
  <text x="967" y="503" text-anchor="middle" font-size="10" fill="#374151">Supabase Cloud DB</text>
  <text x="967" y="519" text-anchor="middle" font-size="8.5" fill="#64748b">5 Tables · HikariCP max 10</text>
  <text x="967" y="533" text-anchor="middle" font-size="8" fill="#94a3b8">member · gallery · reservation · todo · sns_user</text>

  <!-- Footer -->
  <text x="550" y="648" text-anchor="middle" font-size="9" fill="#94a3b8">Art Museum Gallery Reservation  ·  Spring Boot MVC  ·  AWS EC2 Deployment  ·  Supabase PostgreSQL</text>
