<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security6"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예약 상세 - 갤러리 예약</title>
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <style>
      /* 예약 상세 전용 — common.css 토큰·컴포넌트와 통일 */

      .pageWrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .backLink {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 28px;
        transition: color 0.12s;
      }
      .backLink:hover {
        color: var(--text);
        text-decoration: none;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 400px;
        gap: 28px;
        align-items: start;
      }
      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .leftCol {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .coverBox {
        width: 100%;
        max-width: 400px;
        aspect-ratio: 4 / 3;
        border-radius: var(--radius);
        border: 1px solid var(--stroke);
        background: var(--bg1);
        background-size: cover;
        background-position: center;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .coverBox .noImg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        background: var(--surface2);
        z-index: 1;
      }

      .exhibitCard {
        background: var(--surface);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        padding: 28px 24px;
        box-shadow: var(--shadow);
      }
      .exhibitName {
        margin: 0 0 10px;
        font-family: "Plus Jakarta Sans", "Noto Sans KR", sans-serif;
        font-size: clamp(24px, 3vw, 34px);
        font-weight: 900;
        letter-spacing: -0.5px;
        line-height: 1.15;
        color: var(--text);
      }
      .exhibitLocation {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 16px;
        padding: 6px 10px;
        background: var(--bg1);
        border: 1px solid var(--stroke);
        border-radius: var(--radius-sm);
      }
      .exhibitDesc {
        font-size: 15px;
        font-weight: 400;
        color: var(--text);
        line-height: 1.75;
        border-top: 1px solid var(--stroke);
        padding-top: 16px;
        margin: 0;
      }

      .reserveCard {
        background: var(--surface);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        position: sticky;
        top: calc(var(--nav-h) + 16px);
      }
      @media (max-width: 960px) {
        .reserveCard {
          position: static;
        }
      }

      .reserveHeader,
      .reserveBody,
      .cancelArea,
      .reserveFooter {
        position: relative;
        z-index: 1;
      }

      .reserveHeader {
        padding: 22px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: #111111;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }
      .reserveHeaderLeft .rLabel {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      .reserveHeaderLeft .rId {
        font-family: "Plus Jakarta Sans", "Noto Sans KR", sans-serif;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.5px;
        margin-top: 4px;
        color: #ffffff;
      }
      .reserveHeader .badge {
        min-width: auto;
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.92);
        box-shadow: none;
      }
      .reserveHeader .badge-ok {
        background: rgba(26, 115, 65, 0.28);
        border-color: rgba(26, 115, 65, 0.45);
        color: #c8e6d5;
      }
      .reserveHeader .badge-warn {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.28);
        color: rgba(255, 255, 255, 0.88);
      }
      .reserveHeader .badge-danger {
        background: rgba(192, 57, 43, 0.35);
        border-color: rgba(192, 57, 43, 0.5);
        color: #ffc9c2;
      }

      .reserveBody {
        padding: 0;
      }
      .infoRow {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--stroke);
      }
      .infoRow:last-child {
        border-bottom: none;
      }
      .infoKey {
        width: 72px;
        flex-shrink: 0;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        padding-top: 4px;
      }
      .infoVal {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.45;
      }
      .infoValSub {
        font-size: 12.5px;
        font-weight: 500;
        color: var(--muted);
        margin-top: 4px;
      }

      .noteBox {
        background: var(--bg1);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        padding: 14px 16px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        line-height: 1.65;
      }

      .cancelArea {
        margin: 16px;
        padding: 16px;
        border-radius: var(--radius);
        border: 1px solid rgba(192, 57, 43, 0.25);
        background: rgba(192, 57, 43, 0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .cancelAreaText {
        font-size: 13px;
        font-weight: 700;
        color: var(--danger);
      }
      .cancelAreaSub {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        margin-top: 4px;
      }

      .reserveFooter {
        padding: 18px 24px 24px;
        border-top: 1px solid var(--stroke);
        background: var(--bg1);
      }
      .reserveFooter .btn {
        min-height: 44px;
      }

      /* 푸터: common.css 다크 푸터와 통일 (기존 인라인 스타일 덮어쓰기) */
      .appShell > footer {
        border-top: none !important;
        padding: 48px 0 32px !important;
        margin-top: 0 !important;
        background: #111111 !important;
        color: rgba(255, 255, 255, 0.55) !important;
        backdrop-filter: none !important;
      }
      .appShell footer .container {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        flex-wrap: wrap;
        gap: 16px;
        color: rgba(255, 255, 255, 0.55) !important;
        font-size: 13px !important;
        font-weight: 500 !important;
      }
      .appShell footer .container a {
        color: rgba(255, 255, 255, 0.55) !important;
        transition: color 0.12s;
      }
      .appShell footer .container a:hover {
        color: #ffffff !important;
      }

      @media (max-width: 860px) {
        .pageWrap {
          padding: 28px 0 48px;
        }
        .reserveHeader {
          padding: 20px 20px 18px;
        }
        .infoRow {
          padding: 14px 20px;
        }
        .reserveFooter {
          padding: 16px 20px 22px;
        }
      }
      @media (max-width: 560px) {
        .exhibitCard {
          padding: 22px 18px;
        }
        .reserveHeader {
          align-items: flex-start;
          flex-direction: column;
        }
        .cancelArea {
          flex-direction: column;
          align-items: stretch;
        }
        .appShell footer .container {
          flex-direction: column !important;
          align-items: flex-start !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="appShell">
      <nav class="navbar">
        <div class="navbarInner">
          <a class="brand" th:href="@{/}">
            <span class="brandMark"></span>
            <span>Gallery</span>
          </a>
          <div class="navLinks">
            <a class="navLink" th:href="@{/gallery/list}">전시 목록</a>
            <a
              class="navLink"
              sec:authorize="isAuthenticated()"
              th:href="@{/reservation/list}"
              >내 예약</a
            >
            <a
              class="navLink"
              sec:authorize="hasRole('ADMIN')"
              th:href="@{/admin/gallery/list}"
              >관리자</a
            >
          </div>
          <div class="navActions">
            <div
              sec:authorize="!isAuthenticated()"
              style="display: flex; gap: 8px"
            >
              <a class="btn btn-ghost btn-small" th:href="@{/member/login}"
                >로그인</a
              >
            </div>
            <div
              sec:authorize="isAuthenticated()"
              style="display: flex; gap: 8px"
            >
              <form
                th:action="@{/member/logout}"
                method="post"
                style="margin: 0"
              >
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button type="submit" class="btn btn-ghost btn-small">
                  로그아웃
                </button>
              </form>
            </div>
          </div>
        </div>
      </nav>

      <main class="container">
        <div class="pageWrap">
          <a class="backLink" th:href="@{/reservation/list}">← 내 예약 목록</a>

          <div class="layout">
            <!-- ── 왼쪽: 전시 사진 + 소개 ── -->
            <div class="leftCol">
              <!-- 전시 사진 (메인) -->
              <div
                class="coverBox"
                th:style="${gallery != null and gallery.coverImageUrl != null and !#strings.isEmpty(gallery.coverImageUrl)
                           ? 'background-image:url(' + gallery.coverImageUrl + ');background-size:cover;background-position:center;'
                           : ''}"
              >
                <div
                  class="noImg"
                  th:if="${gallery == null or gallery.coverImageUrl == null or #strings.isEmpty(gallery.coverImageUrl)}"
                >
                  이미지 없음
                </div>
              </div>

              <!-- 갤러리명 + 소개 -->
              <div class="exhibitCard">
                <div class="exhibitName" th:text="${reservation.galleryName}">
                  갤러리명
                </div>
                <div
                  class="exhibitLocation"
                  th:text="${gallery != null ? gallery.location : ''}"
                >
                  위치
                </div>
                <div
                  class="exhibitDesc"
                  th:text="${gallery != null and gallery.description != null and !#strings.isEmpty(gallery.description) ? gallery.description : '소개글이 없습니다.'}"
                >
                  전시 공간 소개글이 들어갑니다.
                </div>
              </div>
            </div>

            <!-- ── 오른쪽: 예약 정보 ── -->
            <div class="reserveCard">
              <!-- 헤더: 예약번호 + 상태 -->
              <div class="reserveHeader">
                <div class="reserveHeaderLeft">
                  <div class="rLabel">예약 번호</div>
                  <div class="rId" th:text="'# ' + ${reservation.id}">
                    # 1001
                  </div>
                </div>
                <span
                  th:class="${reservation.status.name() == 'APPROVED'} ? 'badge badge-ok' :
                        (${reservation.status.name() == 'PENDING'}  ? 'badge badge-warn' :
                        (${reservation.status.name() == 'REJECTED'} ? 'badge badge-danger' : 'badge'))"
                  th:text="${reservation.status.name() == 'APPROVED'} ? '확정' :
                       (${reservation.status.name() == 'PENDING'}  ? '대기중' :
                       (${reservation.status.name() == 'REJECTED'} ? '거절' : '취소됨'))"
                >
                </span>
              </div>

              <!-- 예약 상세 정보 -->
              <div class="reserveBody">
                <div class="infoRow">
                  <span class="infoKey">날짜</span>
                  <div>
                    <div
                      class="infoVal"
                      th:text="${reservation.reservationDate}"
                    >
                      2026-04-10
                    </div>
                  </div>
                </div>
                <div class="infoRow">
                  <span class="infoKey">시간</span>
                  <div
                    class="infoVal"
                    th:text="${reservation.startTime + ' ~ ' + reservation.endTime}"
                  >
                    10:00 ~ 11:00
                  </div>
                </div>
                <div class="infoRow">
                  <span class="infoKey">인원</span>
                  <div
                    class="infoVal"
                    th:text="${reservation.guests != null ? reservation.guests + '명' : '-'}"
                  >
                    2명
                  </div>
                </div>
                <div
                  class="infoRow"
                  th:if="${reservation.contact != null and !#strings.isEmpty(reservation.contact)}"
                >
                  <span class="infoKey">연락처</span>
                  <div class="infoVal" th:text="${reservation.contact}">
                    010-0000-0000
                  </div>
                </div>
              </div>

              <!-- 취소 영역 (PENDING일 때만) -->
              <!-- <div
                class="cancelArea"
                th:if="${reservation.status.name() == 'PENDING'}"
              >
                <div>
                  <div class="cancelAreaText">예약을 취소하시겠어요?</div>
                  <div class="cancelAreaSub">
                    취소 후에는 복구할 수 없습니다.
                  </div>
                </div>


                <form
                  th:action="@{/reservation/cancel/{id}(id=${reservation.id})}"
                  method="post"
                  style="margin: 0; flex-shrink: 0"
                >
                  <input
                    type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}"
                  />
                  <button class="btn btn-danger btn-small" type="submit">
                    취소하기
                  </button>
                </form>
                
              </div> -->

              <!-- 카드 하단 -->
              <div class="reserveFooter">
                <a
                  class="btn btn-ghost btn-small"
                  style="width: 100%; justify-content: center"
                  th:href="@{/gallery/list}"
                  >전시 목록 보기</a
                >
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer
        style="
          border-top: 1px solid var(--stroke);
          padding: 24px 0;
          background: #fff;
        "
      >
        <div
          class="container"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
          "
        >
          <div>© 2026 Art Gallery Reservation System.</div>
          <div style="display: flex; gap: 20px">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Use</a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
