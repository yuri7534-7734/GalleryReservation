<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할 일 작성 - 갤러리 예약</title>
  <style>
    /* inline shared style for standalone preview */
:root{
      --bg0:#070A14;
      --bg1:#0B1020;
      --surface:rgba(255,255,255,.06);
      --surface2:rgba(255,255,255,.09);
      --stroke:rgba(255,255,255,.12);
      --text:#EAF0FF;
      --muted:rgba(234,240,255,.72);
      --accent:#D6B25E;
      --accent2:#6DD6FF;
      --danger:#FF5C7A;
      --ok:#36E8A1;
      --shadow:0 18px 60px rgba(0,0,0,.40);
      --radius:18px;
      --radius-sm:12px;
      --ring:0 0 0 4px rgba(214,178,94,.22);
      --container:1120px;
    }
    html[data-theme="light"]{
      --bg0:#F7F8FF;
      --bg1:#EEF1FF;
      --surface:rgba(9,15,33,.05);
      --surface2:rgba(9,15,33,.08);
      --stroke:rgba(9,15,33,.12);
      --text:#0B1020;
      --muted:rgba(11,16,32,.70);
      --shadow:0 18px 60px rgba(11,16,32,.14);
    }
    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(1200px 600px at 18% -10%, rgba(214,178,94,.25), transparent 60%),
        radial-gradient(900px 520px at 90% 10%, rgba(109,214,255,.20), transparent 55%),
        radial-gradient(700px 420px at 40% 95%, rgba(54,232,161,.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height:100vh;
    }
    a{ color:inherit; text-decoration:none; }
    a:hover{ text-decoration:underline; }
    .appShell{ min-height:100vh; display:flex; flex-direction:column; }
    main{ flex:1; }
    .container{ max-width:var(--container); margin:0 auto; padding:0 20px; }

    /* Focus */
    :focus-visible{
      outline:none;
      box-shadow: var(--ring);
      border-color: rgba(214,178,94,.65) !important;
    }

    /* Typography */
    .kicker{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border-radius:999px;
      color:var(--muted);
      font-weight:650;
      letter-spacing:.2px;
      font-size:13px;
    }
    .title{
      margin:12px 0 8px;
      font-size: clamp(26px, 3vw, 38px);
      letter-spacing:-.8px;
      line-height:1.1;
    }
    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      max-width:70ch;
    }
    .hero{
      padding:44px 0 26px;
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      left:-260px; top:-260px;
      width:560px; height:560px;
      background: radial-gradient(circle at 30% 30%, rgba(214,178,94,.35), transparent 62%);
      filter: blur(6px);
      pointer-events:none;
      opacity:.95;
    }
    .hero::after{
      content:"";
      position:absolute;
      right:-260px; top:-180px;
      width:560px; height:560px;
      background: radial-gradient(circle at 50% 30%, rgba(109,214,255,.28), transparent 60%);
      filter: blur(7px);
      pointer-events:none;
      opacity:.8;
    }

    /* Components */
    .card{
      background:var(--surface);
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }
    .cardPad{ padding:18px; }
    .row{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .stack{ display:flex; flex-direction:column; gap:12px; }
    .grid{ display:grid; gap:16px; }
    .grid-2{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
    @media (max-width: 920px){
      .grid-2, .grid-3{ grid-template-columns: 1fr; }
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:11px 14px;
      border-radius: 12px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      color:var(--text);
      font-weight:700;
      letter-spacing:.15px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      text-decoration:none;
      white-space:nowrap;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(214,178,94,.55); }
    .btn:active{ transform: translateY(0px); }
    .btn-primary{
      border-color: rgba(214,178,94,.55);
      background:
        radial-gradient(120% 180% at 20% 0%, rgba(214,178,94,.45), transparent 60%),
        linear-gradient(180deg, rgba(214,178,94,.30), rgba(214,178,94,.12));
    }
    .btn-ghost{
      background: transparent;
      border-color: rgba(255,255,255,.18);
    }
    .btn-danger{
      border-color: rgba(255,92,122,.45);
      background: linear-gradient(180deg, rgba(255,92,122,.22), rgba(255,92,122,.08));
    }
    .btn-small{ padding:8px 10px; border-radius:10px; font-size:13px; font-weight:750; }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-weight:750;
      font-size:12.5px;
      letter-spacing:.2px;
      white-space:nowrap;
    }
    .badge-ok{ border-color: rgba(54,232,161,.45); color: rgba(54,232,161,.95); background: rgba(54,232,161,.10); }
    .badge-warn{ border-color: rgba(214,178,94,.55); color: rgba(214,178,94,.98); background: rgba(214,178,94,.10); }
    .badge-danger{ border-color: rgba(255,92,122,.45); color: rgba(255,92,122,.98); background: rgba(255,92,122,.10); }
    .badge-info{ border-color: rgba(109,214,255,.45); color: rgba(109,214,255,.98); background: rgba(109,214,255,.10); }

    /* Navbar */
    .navbar{
      position: sticky;
      top:0;
      z-index:60;
      backdrop-filter: blur(14px);
      background: rgba(7,10,20,.55);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    html[data-theme="light"] .navbar{
      background: rgba(247,248,255,.74);
      border-bottom: 1px solid rgba(11,16,32,.10);
    }
    .navbarInner{
      max-width:var(--container);
      margin:0 auto;
      padding:12px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:-.4px;
    }
    .brandMark{
      width:36px; height:36px;
      border-radius:12px;
      background:
        radial-gradient(circle at 30% 20%, rgba(214,178,94,.95), rgba(214,178,94,.15) 55%, transparent 62%),
        radial-gradient(circle at 70% 60%, rgba(109,214,255,.85), rgba(109,214,255,.10) 58%, transparent 63%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 12px 40px rgba(214,178,94,.18);
    }
    .navLinks{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .navLink{
      padding:9px 12px;
      border-radius:12px;
      border:1px solid transparent;
      color:var(--muted);
      font-weight:800;
      font-size:13.5px;
      transition: border-color .12s ease, color .12s ease, background .12s ease;
    }
    .navLink:hover{
      border-color: rgba(214,178,94,.45);
      color:var(--text);
      background: rgba(255,255,255,.04);
      text-decoration:none;
    }
    .navActions{ display:flex; align-items:center; gap:10px; }
    .hamburger{
      display:none;
      width:44px; height:44px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color:var(--text);
      cursor:pointer;
      font-weight:900;
    }
    @media (max-width: 920px){
      .navLinks{ display:none; }
      .hamburger{ display:inline-flex; align-items:center; justify-content:center; }
    }
    #mobileMenu{
      display:none;
      border-top: 1px solid rgba(255,255,255,.10);
    }
    #mobileMenu[data-open="true"]{ display:block; }
    .mobileMenuInner{
      max-width:var(--container);
      margin:0 auto;
      padding:10px 20px 16px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .mobileMenuInner .navLink{ width:100%; border-color: rgba(255,255,255,.10); background: rgba(255,255,255,.03); }

    /* Forms */
    label{ display:block; font-weight:850; font-size:13px; color:var(--muted); margin-bottom:7px; }
    input, select, textarea{
      width:100%;
      padding:12px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--text);
      outline: none;
      transition: border-color .12s ease, background .12s ease;
      font-size:14.5px;
    }
    textarea{ min-height:120px; resize: vertical; }
    input::placeholder, textarea::placeholder{ color: rgba(234,240,255,.45); }
    html[data-theme="light"] input::placeholder,
    html[data-theme="light"] textarea::placeholder{ color: rgba(11,16,32,.38); }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(214,178,94,.55);
      background: rgba(255,255,255,.06);
    }
    .helpText{ color: var(--muted); font-size:12.5px; line-height:1.5; margin-top:8px; }
    .formGrid{
      display:grid;
      gap:16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    @media (max-width: 920px){ .formGrid{ grid-template-columns: 1fr; } }

    /* Tables */
    .tableWrap{
      overflow:auto;
      border-radius: var(--radius);
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.03);
    }
    table{
      width:100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 720px;
    }
    thead th{
      position: sticky;
      top:0;
      background: rgba(255,255,255,.04);
      z-index:1;
      text-align:left;
      padding:14px 14px;
      font-size:12.5px;
      letter-spacing:.3px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    tbody td{
      padding:14px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: rgba(234,240,255,.92);
      vertical-align: middle;
    }
    tbody tr:hover td{
      background: rgba(255,255,255,.03);
    }
    html[data-theme="light"] tbody td{ color: rgba(11,16,32,.92); }
    html[data-theme="light"] tbody tr:hover td{ background: rgba(11,16,32,.03); }

    /* Thumb */
    .thumb{
      height: 160px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(120% 80% at 20% 0%, rgba(214,178,94,.40), transparent 60%),
        radial-gradient(100% 70% at 80% 20%, rgba(109,214,255,.30), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
      overflow:hidden;
      position:relative;
    }
    .thumb::after{
      content:"";
      position:absolute;
      inset:-30px -30px auto -30px;
      height:120px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      transform: rotate(-10deg);
      opacity:.9;
    }
    .thumbLabel{
      position:absolute;
      left:14px;
      bottom:14px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .thumbTitle{
      font-weight:950;
      letter-spacing:-.4px;
      font-size:18px;
    }
    .thumbMeta{
      color:var(--muted);
      font-weight:800;
      font-size:12.5px;
    }

    /* Footer */
    footer{
      border-top: 1px solid rgba(255,255,255,.10);
      padding:22px 0;
      color: var(--muted);
    }
    .footerInner{
      max-width: var(--container);
      margin:0 auto;
      padding:0 20px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }
    .footerLinks{ display:flex; gap:14px; flex-wrap:wrap; }

    /* Toast */
    #grToast{
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      min-width: 260px;
      max-width: 380px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(7,10,20,.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      color: var(--text);
      display:none;
    }
    html[data-theme="light"] #grToast{
      background: rgba(247,248,255,.86);
      border: 1px solid rgba(11,16,32,.14);
    }
    #grToast[data-show="true"]{ display:block; }
    #grToast strong{ display:block; margin-bottom:2px; }
    #grToast .toastText{ color: var(--muted); line-height:1.45; font-weight:700; font-size:13.5px; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; scroll-behavior:auto !important; }
      .btn:hover{ transform:none; }
    }
  </style>
  </head>
  <body>
    <div class="appShell">
  <nav class="navbar">
    <div class="navbarInner">
      <a class="brand" th:href="@{/}">
        <span class="brandMark"></span>
        <span>Gallery</span>
      </a>
      <div class="navLinks">
        <a class="navLink" th:href="@{/gallery/list}">전시 목록</a>
        <a class="navLink" sec:authorize="isAuthenticated()" th:href="@{/reservation/list}">내 예약</a>
        <a class="navLink" sec:authorize="isAuthenticated()" th:href="@{/todo/list}">할 일</a>
        <a class="navLink" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/gallery/list}">관리자</a>
      </div>
      <div class="navActions">
        <div sec:authorize="!isAuthenticated()" style="display:flex;gap:8px;">
          <a class="btn btn-ghost btn-small" th:href="@{/member/login}">로그인</a>
          <a class="btn btn-primary btn-small" th:href="@{/member/join}">회원가입</a>
        </div>
        <div sec:authorize="isAuthenticated()" style="display:flex;gap:8px;">
          <form th:action="@{/member/logout}" method="post" style="margin:0;">
            <button type="submit" class="btn btn-ghost btn-small">로그아웃</button>
          </form>
        </div>
      </div>
    </div>
  </nav>


      <main class="container">
        <section class="hero">
          <div class="kicker">TODO</div>
          <h1 class="title">할 일 작성</h1>
          <p class="subtitle">
            전시 운영 준비, 점검, 공지 초안 등 업무를 체계적으로 관리합니다.
          </p>
        </section>

        <section class="grid grid-2" style="align-items: start">
          <div class="card cardPad">
            <form
              th:action="@{/todo/form}"
              th:object="${todoCreateRequestDto}"
              method="post"
              class="stack"
              id="todoForm"
            >
              <div class="row" style="flex-wrap: wrap">
                <div>
                  <div
                    style="
                      font-weight: 950;
                      letter-spacing: -0.3px;
                      font-size: 16px;
                    "
                  >
                    기본 정보
                  </div>
                  <div class="helpText" style="margin: 6px 0 0">
                    제목 · 카테고리 · 기한을 입력하세요.
                  </div>
                </div>
                <a
                  class="btn btn-ghost btn-small"
                  href="#"
                  th:href="@{/todo/list}"
                  >목록으로</a
                >
              </div>

              <div class="formGrid">
                <div>
                  <label for="todoTitle">제목</label>
                  <input
                    id="todoTitle"
                    th:field="*{title}"
                    type="text"
                    placeholder="예: 입장 동선 점검"
                    required
                  />
                </div>
                <div>
                  <label for="todoCategory">카테고리</label>
                  <select id="todoCategory" th:field="*{category}" required>
                    <option value="운영" selected>운영</option>
                    <option value="점검">점검</option>
                    <option value="공지">공지</option>
                    <option value="청소">청소</option>
                  </select>
                </div>
                <div>
                  <label for="todoDue">기한</label>
                  <input
                    id="todoDue"
                    th:field="*{dueDate}"
                    type="date"
                    required
                  />
                </div>
                <div>
                  <label for="todoAssignee">담당자</label>
                  <input
                    id="todoAssignee"
                    th:field="*{assignee}"
                    type="text"
                    placeholder="예: 스태프 A"
                  />
                </div>
              </div>

              <div class="formGrid">
                <div>
                  <label for="todoPriority">우선순위</label>
                  <select id="todoPriority" th:field="*{priority}">
                    <option value="LOW">낮음</option>
                    <option value="MEDIUM" selected>보통</option>
                    <option value="HIGH">높음</option>
                  </select>
                </div>
                <div>
                  <label for="todoStatus">상태</label>
                  <select id="todoStatus" th:field="*{status}">
                    <option value="OPEN" selected>미완료</option>
                    <option value="DONE">완료</option>
                  </select>
                </div>
              </div>

              <div>
                <label for="todoDesc">상세 설명</label>
                <textarea
                  id="todoDesc"
                  th:field="*{description}"
                  placeholder="작업 체크 포인트를 간단히 적어주세요. 예: 표지판 위치, 조도, 동선 혼잡도 등."
                ></textarea>
              </div>

              <div
                class="row"
                style="justify-content: flex-end; flex-wrap: wrap"
              >
                <a class="btn btn-ghost" href="#" th:href="@{/todo/list}"
                  >취소</a
                >
                <button class="btn btn-primary" type="submit">등록</button>
              </div>
            </form>
          </div>

          <div class="stack">
            <div class="card cardPad">
              <div class="row" style="flex-wrap: wrap">
                <div>
                  <div
                    style="
                      font-weight: 950;
                      letter-spacing: -0.3px;
                      font-size: 16.5px;
                    "
                  >
                    미리보기
                  </div>
                  <div class="helpText" style="margin: 6px 0 0">
                    입력값이 카드 형태로 실시간 표시됩니다.
                  </div>
                </div>
                <span class="badge badge-warn" id="previewState">미완료</span>
              </div>

              <div style="height: 14px"></div>

              <div
                class="card"
                style="
                  box-shadow: none;
                  background: rgba(255, 255, 255, 0.03);
                  padding: 14px;
                "
              >
                <div
                  style="
                    font-weight: 1000;
                    letter-spacing: -0.35px;
                    font-size: 18px;
                  "
                  id="prevTitle"
                >
                  할 일 제목
                </div>
                <div
                  class="helpText"
                  style="margin: 6px 0 0; font-size: 13.5px"
                  id="prevDesc"
                >
                  상세 설명이 여기에 표시됩니다.
                </div>
                <div style="height: 12px"></div>
                <div class="grid grid-2" style="gap: 12px">
                  <div class="badge" id="prevCategory">카테고리</div>
                  <div class="badge" id="prevDue">기한</div>
                </div>
                <div style="height: 12px"></div>
                <div class="row" style="justify-content: flex-start; gap: 8px">
                  <div class="badge" id="prevPriority">우선순위</div>
                  <div class="badge badge-info" id="prevAssignee">담당자</div>
                </div>
              </div>
            </div>

            <div class="card cardPad">
              <h2
                style="
                  margin: 0 0 8px;
                  font-size: 16.5px;
                  letter-spacing: -0.3px;
                "
              >
                작성 팁
              </h2>
              <div class="helpText" style="margin: 0; line-height: 1.8">
                "무엇을 · 어디까지 · 어떤 결과를" 한 문장에 담으면, 다음
                담당자가 이어서 처리하기 쉬워집니다.
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const form = document.getElementById("todoForm");
        if (!form) return;

        const title = document.getElementById("todoTitle");
        const category = document.getElementById("todoCategory");
        const due = document.getElementById("todoDue");
        const assignee = document.getElementById("todoAssignee");
        const priority = document.getElementById("todoPriority");
        const status = document.getElementById("todoStatus");
        const desc = document.getElementById("todoDesc");

        const prevTitle = document.getElementById("prevTitle");
        const prevDesc = document.getElementById("prevDesc");
        const prevCategory = document.getElementById("prevCategory");
        const prevDue = document.getElementById("prevDue");
        const prevPriority = document.getElementById("prevPriority");
        const prevAssignee = document.getElementById("prevAssignee");
        const previewState = document.getElementById("previewState");
        if (!prevTitle || !prevDue) return;

        function apply() {
          prevTitle.textContent = (title.value || "할 일 제목").trim();
          prevDesc.textContent = (
            desc.value || "상세 설명이 여기에 표시됩니다."
          ).trim();
          prevCategory.textContent =
            category.options[category.selectedIndex]?.text || "카테고리";
          prevDue.textContent = due.value ? due.value : "기한";
          prevPriority.textContent =
            priority.options[priority.selectedIndex]?.text || "우선순위";
          prevAssignee.textContent =
            (assignee.value || "담당자").trim() || "담당자";

          const st = status.value || "OPEN";
          previewState.className = "badge";
          if (st === "DONE") {
            previewState.textContent = "완료";
            previewState.classList.add("badge-ok");
          } else {
            previewState.textContent = "미완료";
            previewState.classList.add("badge-warn");
          }
        }

        ["input", "change"].forEach((evt) => {
          [title, category, due, assignee, priority, status, desc].forEach(
            (el) => el && el.addEventListener(evt, apply),
          );
        });
        apply();
      })();
    </script>
  </body>
</html>
