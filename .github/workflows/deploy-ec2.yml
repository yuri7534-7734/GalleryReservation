name: Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build jar (skip tests)
        run: ./gradlew bootJar -x test

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: "22"
          script_stop: true
          command_timeout: 30m
          envs: DEPLOY_PATH,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,APPLICATION_YML,APPLICATION_SECRET_YML
          script: |
            set -e

            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi

            cd "$DEPLOY_PATH"
            git pull origin main

            echo "$APPLICATION_YML" > src/main/resources/application.yml
            echo "$APPLICATION_SECRET_YML" > src/mai
